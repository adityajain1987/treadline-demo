<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Treadline — Cheque &amp; Credit Tracker (Demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d0f14; --ink-2:#1f2430; --txt:#14171d; --muted:#666d79; --faint:#9aa0ab;
    --line:#ecedf1; --line-2:#f4f5f7; --bg:#f7f8fa; --card:#ffffff;
    --brand:#4f46e5; --brand-2:#6366f1; --brand-ink:#4338ca; --brand-bg:#eef0fe;
    --ok:#15a34a; --ok-bg:#e9f6ee; --warn:#b7791f; --warn-bg:#fbf3e0;
    --bad:#e0413f; --bad-bg:#fdecec; --info:#4f46e5; --info-bg:#eef0fe;
    --sh-sm:0 1px 1.5px rgba(16,18,24,.04);
    --sh:0 1px 2px rgba(16,18,24,.04),0 1px 3px rgba(16,18,24,.03);
    --sh-lg:0 18px 48px -16px rgba(16,18,24,.22);
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans Arabic",sans-serif;
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45;letter-spacing:-.005em}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

  /* ---- app shell ---- */
  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  .side{background:var(--card);border-inline-end:1px solid var(--line);color:var(--muted);display:flex;flex-direction:column;
    padding:20px 14px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 22px}
  .brand .mark{width:32px;height:32px;border-radius:9px;background:var(--ink);
    display:grid;place-items:center;color:#fff}
  .brand .nm{font-weight:800;font-size:17px;color:var(--txt);letter-spacing:-.02em}
  .nav{display:flex;flex-direction:column;gap:2px;margin-top:6px}
  .nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:var(--muted);
    text-decoration:none;font-weight:600;font-size:13.5px;cursor:pointer;transition:.12s}
  .nav a:hover{background:var(--bg);color:var(--txt)}
  .nav a.on{background:var(--brand-bg);color:var(--brand-ink)}
  .nav a.on svg{color:var(--brand)}
  .nav svg{width:18px;height:18px;color:var(--faint)}
  .side .grow{flex:1}
  .side .demo{display:flex;align-items:center;gap:8px;background:var(--warn-bg);border:1px solid #f3e3bf;
    color:var(--warn);border-radius:9px;padding:9px 11px;font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
  .side .who{margin-top:12px;padding:11px;border-radius:9px;background:var(--bg);border:1px solid var(--line);font-size:12px;color:var(--muted);line-height:1.5}
  .side .who b{color:var(--txt);display:block;font-size:13px;font-weight:700}

  /* ---- main ---- */
  .main{min-width:0;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;gap:14px;padding:18px 28px;border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.7);backdrop-filter:saturate(1.5) blur(6px);position:sticky;top:0;z-index:20}
  .top h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-.02em}
  .top .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
  .top .grow{flex:1}
  .top .date{color:var(--muted);font-size:12.5px;font-weight:500}
  .toggle{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;box-shadow:var(--sh-sm)}
  .toggle button{border:0;background:#fff;padding:8px 13px;font-weight:700;cursor:pointer;color:var(--muted);font-size:13px;font-family:inherit}
  .toggle button.on{background:var(--ink);color:#fff}
  .content{padding:24px 28px 60px;max-width:1280px;width:100%}

  /* ---- kpis ---- */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
  .kpi .row1{display:flex;align-items:center;gap:8px;padding-inline-end:62px}
  .kpi .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none}
  .kpi .ic svg{width:16px;height:16px}
  .kpi .label{color:var(--muted);font-size:12.5px;font-weight:600}
  .kpi .val{font-size:21px;font-weight:800;margin-top:11px;letter-spacing:-.03em;white-space:nowrap}
  .kpi .sub{font-size:12px;color:var(--faint);margin-top:3px;font-weight:500}
  .kpi .spark{position:absolute;inset-inline-end:14px;top:16px;opacity:.9}
  .ic.teal{background:var(--brand-bg,#e6f6f5);color:var(--brand-ink)}
  .ic.red{background:var(--bad-bg);color:var(--bad)} .ic.amber{background:var(--warn-bg);color:var(--warn)}
  .ic.blue{background:var(--info-bg);color:var(--info)}
  .kpi.bad .val{color:var(--bad)} .kpi.amber .val{color:var(--warn)}

  /* ---- grid ---- */
  .cols{display:grid;grid-template-columns:1.74fr 1fr;gap:16px;align-items:start}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
  .ch{display:flex;align-items:center;gap:9px;padding:15px 18px;border-bottom:1px solid var(--line-2)}
  .ch h2{font-size:14px;margin:0;font-weight:700}
  .ch .count{margin-inline-start:auto;font-size:11px;color:var(--muted);font-weight:700;background:var(--line-2);padding:3px 9px;border-radius:999px}

  /* ---- table ---- */
  table{width:100%;border-collapse:collapse}
  th,td{text-align:start;padding:12px 15px;font-size:13.5px;border-bottom:1px solid var(--line-2);white-space:nowrap}
  th{color:var(--faint);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  tbody tr{cursor:pointer;transition:background .12s}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:#fafbfd}
  td.num{font-weight:700}
  .who2{display:flex;align-items:center;gap:11px}
  .av{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:12.5px;flex:none;letter-spacing:.02em}
  .who2 .nm{font-weight:700} .who2 .br{font-size:11.5px;color:var(--faint);margin-top:1px}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .chip::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .c-ok{background:var(--ok-bg);color:var(--ok)} .c-warn{background:var(--warn-bg);color:var(--warn)}
  .c-bad{background:var(--bad-bg);color:var(--bad)} .c-info{background:var(--info-bg);color:var(--info)}
  .bar{height:7px;border-radius:999px;background:var(--line);overflow:hidden;margin-top:6px;width:82px}
  .bar>i{display:block;height:100%;border-radius:999px}
  .usage{font-size:12px;font-weight:700;color:var(--ink-2)}

  /* ---- exposure donut ---- */
  .expo{padding:18px;display:flex;align-items:center;gap:18px}
  .donut-wrap{position:relative;flex:none}
  .donut-c{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
  .donut-c .p{font-size:21px;font-weight:800;letter-spacing:-.02em}
  .donut-c .l{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .expo .meta{flex:1;display:flex;flex-direction:column;gap:10px}
  .expo .mrow{display:flex;justify-content:space-between;align-items:center;font-size:13px}
  .expo .mrow .k{color:var(--muted);display:flex;align-items:center;gap:7px}
  .expo .mrow .k i{width:9px;height:9px;border-radius:3px;display:inline-block}
  .expo .mrow b{font-weight:800}

  /* ---- alerts ---- */
  .alert{display:flex;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line-2);align-items:center}
  .alert:last-child{border-bottom:0}
  .alert .ab{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:none}
  .alert .ab svg{width:15px;height:15px}
  .alert .t{font-weight:700;font-size:13.5px} .alert .d{color:var(--muted);font-size:12px;margin-top:1px}
  .alert .amt{margin-inline-start:auto;font-weight:800;font-size:13px;text-align:end}

  /* ---- filters ---- */
  .filters{display:flex;gap:6px;padding:13px 18px 13px;border-bottom:1px solid var(--line-2);flex-wrap:wrap}
  .filters button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 14px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;transition:.12s}
  .filters button:hover{border-color:#d7dee8}
  .filters button.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* ---- drawer ---- */
  .scrim{position:fixed;inset:0;background:rgba(11,18,32,.5);opacity:0;pointer-events:none;transition:.22s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;inset-inline-end:0;height:100%;width:430px;max-width:93vw;background:#fff;z-index:50;
    transform:translateX(110%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:var(--sh-lg);overflow-y:auto}
  [dir=rtl] .drawer{transform:translateX(-110%)}
  .drawer.show{transform:translateX(0)}
  .dh{padding:22px 22px 18px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:13px}
  .dh .x{margin-inline-start:auto;border:0;background:var(--line-2);border-radius:9px;width:32px;height:32px;cursor:pointer;font-size:15px;color:var(--ink-2);font-family:inherit}
  .dh h3{margin:0 0 4px;font-size:18px;font-weight:800}
  .dh .m{color:var(--muted);font-size:12.5px;display:flex;align-items:center;gap:9px}
  .dsec{padding:16px 22px;border-bottom:1px solid var(--line-2)}
  .dsec .lbl{font-size:11px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:11px}
  .age{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;text-align:center}
  .age .b{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px 4px}
  .age .a-v{font-weight:800;font-size:15px} .age .a-l{font-size:10px;color:var(--muted);margin-top:3px}
  .age .hot{background:var(--bad-bg);border-color:#f6cccc} .age .hot .a-v{color:var(--bad)}
  .minirow{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line);font-size:13px;align-items:center}
  .minirow:last-child{border-bottom:0}
  .foot{color:var(--faint);font-size:11.5px;text-align:center;margin-top:28px;line-height:1.7}

  @media(max-width:980px){.cols{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:720px){
    .app{grid-template-columns:1fr}
    .side{position:static;height:auto;flex-direction:row;align-items:center;padding:12px 16px;gap:10px}
    .side .nav,.side .grow,.side .who{display:none}
    .side .demo{margin-inline-start:auto}
    .content{padding:18px 16px 50px}.top{padding:14px 16px}
  }
  @media(max-width:640px){
    table thead{display:none}
    table tbody tr{display:block;border:1px solid var(--line);border-radius:12px;margin:10px 14px;padding:2px 0;box-shadow:var(--sh-sm)}
    table tbody tr td{display:flex;align-items:center;justify-content:space-between;gap:14px;border:0;padding:9px 14px;white-space:normal;text-align:start}
    table tbody tr td::before{content:attr(data-label);color:var(--faint);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;flex:none}
    table tbody tr td:first-child{padding:12px 14px 6px}
    table tbody tr td:first-child::before{display:none}
    .bar{width:130px}
    .drawer{width:100%;max-width:100%}
  }
  /* ---- lifecycle: actions, modal, toast ---- */
  .acts{display:flex;gap:6px;justify-content:flex-end}
  .actbtn{border:1px solid var(--line);background:#fff;border-radius:8px;min-width:30px;height:28px;display:inline-grid;place-items:center;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);font-family:inherit;padding:0 7px;transition:.12s}
  .actbtn svg{width:15px;height:15px}
  .actbtn:hover{border-color:#cfd8e3}
  .actbtn.ok:hover{background:var(--ok-bg);color:var(--ok);border-color:transparent}
  .actbtn.bad:hover{background:var(--bad-bg);color:var(--bad);border-color:transparent}
  .actbtn.info:hover{background:var(--info-bg);color:var(--info);border-color:transparent}
  .addbtn{margin-inline-start:auto;border:0;background:var(--ink);color:#fff;border-radius:9px;padding:7px 13px;font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
  .addbtn svg{width:14px;height:14px}
  .blocked{display:flex;align-items:center;gap:10px;background:var(--bad-bg);color:#b91c1c;border:1px solid #f6cccc;border-radius:12px;padding:12px 14px;font-size:12.5px}
  .blocked svg{width:18px;height:18px;flex:none}
  .mscrim{position:fixed;inset:0;background:rgba(11,18,32,.5);opacity:0;pointer-events:none;transition:.2s;z-index:60;display:grid;place-items:center;padding:20px}
  .mscrim.show{opacity:1;pointer-events:auto}
  .modal{background:#fff;border-radius:18px;box-shadow:var(--sh-lg);width:430px;max-width:94vw;max-height:90vh;overflow:auto;transform:translateY(8px) scale(.98);transition:.2s}
  .mscrim.show .modal{transform:none}
  .mh{padding:18px 20px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:10px}
  .mh h3{margin:0;font-size:16px;font-weight:800}
  .mh .x{margin-inline-start:auto;border:0;background:var(--line-2);border-radius:8px;width:30px;height:30px;cursor:pointer;font-family:inherit;color:var(--ink-2);font-size:14px}
  .mb{padding:18px 20px}
  .fld{margin-bottom:13px}
  .fld label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
  .fld input,.fld select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fff;color:var(--txt)}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(14,165,164,.14)}
  .photo{width:100%;border:1px dashed #cbd5e1;background:var(--bg);border-radius:11px;padding:12px;font-size:12.5px;color:var(--ink-2);cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:15px;font-family:inherit;font-weight:600}
  .photo svg{width:18px;height:18px;color:var(--brand-ink);flex:none}
  .mactions{display:flex;gap:9px;margin-top:4px}
  .btn{flex:1;border:0;border-radius:10px;padding:11px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:inherit}
  .btn.primary{background:var(--brand);color:#fff}
  .btn.ghost{background:var(--line-2);color:var(--ink-2)}
  .wa{background:#dff2e2;border-radius:14px;padding:6px}
  .wabar{display:flex;align-items:center;gap:9px;padding:8px 10px;color:#075e54;font-weight:700;font-size:13px}
  .wabar svg{width:18px;height:18px}
  .wabubble{background:#fff;border-radius:12px;padding:12px 14px;margin:2px 4px 6px;font-size:13px;line-height:1.65;box-shadow:0 1px 1px rgba(0,0,0,.07);white-space:pre-line}
  .watime{font-size:10px;color:#9aa7b6;text-align:end;margin-top:6px}
  .toast{position:fixed;inset-block-end:26px;inset-inline:0;margin-inline:auto;width:max-content;max-width:90vw;background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:var(--sh-lg);z-index:70;opacity:0;transform:translateY(10px);transition:.2s;pointer-events:none;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:none}
  .toast svg{width:16px;height:16px;flex:none}
</style>
</head>
<body>
<script>
(function(){try{if(localStorage.getItem("tl_ok")==="1")return;}catch(e){}
var H="923f691f3e24dfee676c1313c5346ff91bba58e737f2fe0d4b9c5a41af5e43c0",d=document;

var c=mk("div","background:#fff;border-radius:18px;padding:30px 26px;width:340px;max-width:92vw;box-shadow:0 30px 70px -20px rgba(0,0,0,.5);text-align:center");
var lg=mk("div","width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#4f46e5,#4338ca);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:22px","◎");
var h=mk("div","font-weight:800;font-size:20px;letter-spacing:-.02em;color:#14171d","Treadline");
var sub=mk("div","color:#666d79;font-size:13.5px;margin:6px 0 20px","Enter the password to view the demo");
var inp=mk("input","width:100%;border:1px solid #ecedf1;border-radius:11px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;box-sizing:border-box");inp.type="password";inp.placeholder="Password";inp.setAttribute("aria-label","Password");
var err=mk("div","color:#e0413f;font-size:12.5px;height:16px;margin:9px 0 3px;font-weight:600","");
var btn=mk("button","width:100%;border:0;border-radius:11px;padding:12px;background:#4f46e5;color:#fff;font-weight:700;font-size:14.5px;cursor:pointer;font-family:inherit;margin-top:4px","Unlock");btn.type="button";
function ok(){try{localStorage.setItem("tl_ok","1");}catch(e){}ov.remove();}

<div class="app">
  <!-- sidebar -->
  <aside class="side">
    <div class="brand"><span class="mark" id="brandMark"></span><span class="nm">Treadline</span></div>
    <nav class="nav" id="nav"></nav>
    <div class="grow"></div>
    <div class="demo" id="demoTag"></div>
    <div class="who" id="whoBox"></div>
  </aside>

  <!-- main -->
  <div class="main">
    <div class="top">
      <div>
        <h1 id="pageTitle"></h1>
        <div class="sub" id="pageSub"></div>
      </div>
      <div class="grow"></div>
      <span class="date" id="dateLbl"></span>
      <div class="toggle">
        <button id="enBtn" class="on" onclick="setLang('en')">EN</button>
        <button id="arBtn" onclick="setLang('ar')">ع</button>
      </div>
    </div>

    <div class="content">
      <div class="kpis" id="kpis"></div>

      <div class="cols">
        <div class="card" id="dealersCard">
          <div class="ch"><h2 data-i18n="dealers"></h2><span class="count" id="dealerCount"></span></div>
          <div style="overflow-x:auto">
            <table id="dealerTable"><thead><tr>
              <th data-i18n="dealer"></th><th data-i18n="balance"></th>
              <th data-i18n="usage"></th><th data-i18n="status"></th>
            </tr></thead><tbody></tbody></table>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="card" id="exposureCard">
            <div class="ch"><h2 data-i18n="exposure"></h2></div>
            <div class="expo" id="expo"></div>
          </div>
          <div class="card" id="alertsCard">
            <div class="ch"><h2 data-i18n="alerts"></h2><span class="count" id="alertCount"></span></div>
            <div id="alerts"></div>
          </div>
        </div>
      </div>

      <div class="card" id="chequesCard" style="margin-top:16px">
        <div class="ch"><h2 data-i18n="register"></h2><span class="count" id="chqCount"></span></div>
        <div class="filters" id="filters"></div>
        <div style="overflow-x:auto">
          <table id="chqTable"><thead><tr>

  const al=[];
  bounced.forEach(c=>al.push({ic:"alert",cc:"red",t:dn(c.dealer),d:t("aBounced")+c.no,amt:fmt(c.amt),chq:c}));
  dealers.filter(x=>x.bal/x.lim>1 && !x.creditOverride).forEach(x=>al.push({ic:"warn",cc:"red",t:x[lang],d:t("aOver"),amt:fmt(x.bal-x.lim)}));
  dueSoon.slice().sort((a,b)=>days(a.due)-days(b.due)).forEach(c=>al.push({ic:"cheque",cc:"amber",t:dn(c.dealer),d:t("aDue").replace("{n}",fmt0(days(c.due))),amt:fmt(c.amt),chq:c}));
  document.getElementById("alertCount").textContent=fmt0(al.length);
  const ab=document.getElementById("alerts"); clear(ab);
  al.forEach(a=>{
    const right=el("div",{style:"margin-inline-start:auto;display:flex;align-items:center;gap:9px"},[el("span",{class:"amt",style:"margin:0",text:a.amt})]);
    if(a.chq) right.appendChild(el("button",{class:"actbtn info",title:t("remind"),onclick:()=>openReminder(a.chq)},[icon("alert")]));
    ab.appendChild(el("div",{class:"alert"},[el("div",{class:"ab ic "+a.cc},icon(a.ic)),el("div",{},[el("div",{class:"t",text:a.t}),el("div",{class:"d",text:a.d})]),right]));
  });

  // filters + cheques
  const fb=document.getElementById("filters"); clear(fb);
  ["all","pending","bounced","cleared"].forEach(f=>fb.appendChild(el("button",{class:f===filter?"on":"",onclick:()=>setFilter(f),text:t(f)})));
  fb.appendChild(el("button",{class:"addbtn",onclick:openAddCheque},[icon("plus"),el("span",{text:t("addCheque")})]));
  const rows=cheques.filter(c=>filter==="all"||c.st===filter).slice().sort((a,b)=>new Date(a.due)-new Date(b.due));
  document.getElementById("chqCount").textContent=fmt0(rows.length);
  const cb=document.querySelector("#chqTable tbody"); clear(cb);
  rows.forEach(c=>{
    const dd=days(c.due); const dueCell=el("td",{"data-label":t("due")},[document.createTextNode(fmtDate(c.due))]);
    if(c.st==="pending") dueCell.appendChild(el("span",{style:`font-size:11px;color:${dd<0?"var(--bad)":"var(--faint)"}`,text:" · "+(dd<0?t("dueAgo").replace("{n}",fmt0(Math.abs(dd))):t("dueIn").replace("{n}",fmt0(dd)))}));
    const acts=el("div",{class:"acts"});
    if(c.st==="pending"){
      acts.appendChild(el("button",{class:"actbtn ok",title:t("clear"),onclick:(e)=>{e.stopPropagation();markCheque(c,"cleared");}},[icon("check")]));
      acts.appendChild(el("button",{class:"actbtn bad",title:t("bounce"),text:"✕",onclick:(e)=>{e.stopPropagation();markCheque(c,"bounced");}}));
      acts.appendChild(el("button",{class:"actbtn info",title:t("remind"),onclick:(e)=>{e.stopPropagation();openReminder(c);}},[icon("alert")]));
    } else if(c.st==="bounced"){
      acts.appendChild(el("button",{class:"actbtn info",title:t("remind"),onclick:(e)=>{e.stopPropagation();openReminder(c);}},[icon("alert")]));
    }
    acts.appendChild(el("button",{class:"actbtn",title:t("overrideT"),onclick:(e)=>{e.stopPropagation();openOverride(c);}},[icon("edit")]));
    cb.appendChild(el("tr",{onclick:()=>openDealer(c.dealer)},[
      el("td",{},[el("div",{class:"who2"},[el("div",{class:"av",style:"width:28px;height:28px;border-radius:8px;font-size:11px;background:"+avColors[(c.dealer-1)%avColors.length],text:initials(dl(c.dealer))}),el("span",{class:"nm",text:dn(c.dealer)})])]),
      el("td",{"data-label":t("chequeNo"),style:"color:var(--muted)",text:"#"+c.no}),
      el("td",{"data-label":t("bank"),text:banks[c.bank][lang]}),
      el("td",{"data-label":t("amount"),class:"num",text:fmt(c.amt)}),
      dueCell,
      el("td",{"data-label":t("status")},[el("span",{class:chqChip[c.st],text:t(c.st)})]),
      el("td",{},[acts])
    ]));
  });

  // foot
  const f=document.getElementById("foot"); clear(f);
  f.appendChild(document.createTextNode(t("footA"))); f.appendChild(document.createElement("br")); f.appendChild(document.createTextNode(t("footB")));
}
function setLang(l){lang=l;render();}
function setFilter(f){filter=f;render();}

function openDealer(id){
  curDealer=id;
  const d=dl(id);
  const open=cheques.filter(c=>c.dealer===id&&c.st!=="cleared");
  const age={cur:0,b30:0,b60:0,b90:0};
  open.forEach(c=>{const dd=days(c.due); if(dd>=0)age.cur+=c.amt; else if(dd>=-30)age.b30+=c.amt; else if(dd>=-60)age.b60+=c.amt; else age.b90+=c.amt;});
  const st=dealerStatus(d);
  const dr=document.getElementById("drawer"); clear(dr);
  dr.appendChild(el("div",{class:"dh"},[
    el("div",{class:"av",style:"width:46px;height:46px;border-radius:13px;font-size:16px;background:"+avColors[(d.id-1)%avColors.length],text:initials(d)}),
    el("div",{},[el("h3",{text:d[lang]}),el("div",{class:"m"},[(lang==="ar"?d.brAr:d.brEn)+" · ",el("span",{class:stChip[st],text:t(st)})])]),
    el("button",{class:"x",text:"✕",onclick:closeDrawer})
  ]));
  if(st==="over"||st==="overdue") dr.appendChild(el("div",{class:"dsec"},[el("div",{class:"blocked"},[icon("warn"),el("div",{style:"flex:1"},[el("b",{text:t("blockedT")}),el("div",{style:"margin-top:3px;color:#b91c1c",text:t("blockedM")}),el("button",{class:"btn ghost",style:"margin-top:11px;width:100%",onclick:()=>toggleHold(d),text:t("overrideHold")})])])]));
  else if(d.creditOverride) dr.appendChild(el("div",{class:"dsec"},[el("div",{class:"blocked",style:"background:var(--info-bg);border-color:#dfe1fb;color:var(--brand-ink)"},[icon("check"),el("div",{style:"flex:1"},[el("b",{text:t("holdOverriddenT")}),el("div",{style:"margin-top:3px",text:t("holdOverriddenM")}),el("button",{class:"btn ghost",style:"margin-top:11px;width:100%",onclick:()=>toggleHold(d),text:t("undo")})])])]));
  dr.appendChild(el("div",{class:"dsec"},[
    el("div",{class:"minirow"},[el("span",{style:"color:var(--muted)",text:t("outstanding")}),el("b",{class:"num",text:fmt(d.bal)})]),
    el("div",{class:"minirow"},[el("span",{style:"color:var(--muted)",text:t("creditLimit")}),el("b",{class:"num",text:fmt(d.lim)})])
  ]));
  dr.appendChild(el("div",{class:"dsec"},[el("div",{class:"lbl",text:t("ageing")}),
    el("div",{class:"age"},[
      el("div",{class:"b"},[el("div",{class:"a-v num",text:fmt0(age.cur)}),el("div",{class:"a-l",text:t("current")})]),
      el("div",{class:"b"+(age.b30?" hot":"")},[el("div",{class:"a-v num",text:fmt0(age.b30)}),el("div",{class:"a-l",text:t("d30")})]),
      el("div",{class:"b"+(age.b60?" hot":"")},[el("div",{class:"a-v num",text:fmt0(age.b60)}),el("div",{class:"a-l",text:t("d60")})]),
      el("div",{class:"b"+(age.b90?" hot":"")},[el("div",{class:"a-v num",text:fmt0(age.b90)}),el("div",{class:"a-l",text:t("d90")})])
    ])]));
  const led=el("div",{class:"dsec"},[el("div",{class:"lbl",text:t("ledger")})]);
  if(open.length) open.forEach(c=>{
    const dd=days(c.due);
    const tag=c.st==="bounced"?el("span",{class:"chip c-bad",text:t("bounced")}):dd<0?el("span",{class:"chip c-bad",text:t("dueAgo").replace("{n}",fmt0(Math.abs(dd)))}):el("span",{class:"chip c-info",text:t("dueIn").replace("{n}",fmt0(dd))});
    const right=[el("b",{class:"num",text:fmt(c.amt)}),tag];
    if(c.st==="pending"){
      right.push(el("button",{class:"actbtn ok",title:t("clear"),onclick:()=>markCheque(c,"cleared")},[icon("check")]));
      right.push(el("button",{class:"actbtn bad",title:t("bounce"),text:"✕",onclick:()=>markCheque(c,"bounced")}));
    }
    right.push(el("button",{class:"actbtn",title:t("overrideT"),onclick:()=>openOverride(c)},[icon("edit")]));
    led.appendChild(el("div",{class:"minirow"},[el("span",{text:"#"+c.no+" · "+banks[c.bank][lang]}),el("span",{style:"display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:flex-end"},right)]));
  }); else led.appendChild(el("div",{style:"color:var(--muted);font-size:13px",text:"—"}));
  dr.appendChild(led);
  dr.classList.add("show"); document.getElementById("scrim").classList.add("show");
}
function closeDrawer(){document.getElementById("drawer").classList.remove("show");document.getElementById("scrim").classList.remove("show");}

// ---- lifecycle actions ----
function openModal(node){const m=document.getElementById("modal");clear(m);m.appendChild(node);document.getElementById("mscrim").classList.add("show");}
function closeModal(){document.getElementById("mscrim").classList.remove("show");}
let toastT;
function toast(msg,kind){const tn=document.getElementById("toast");clear(tn);const ic=icon(kind==="bad"?"warn":"check");tn.appendChild(ic);tn.appendChild(document.createTextNode(msg));tn.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>tn.classList.remove("show"),2800);}
function refreshAfter(){if(document.getElementById("drawer").classList.contains("show")&&curDealer!=null)openDealer(curDealer);}
function setCheque(c,status,override){c.st=status;if(override)c.overridden=true;render();refreshAfter();}
function markCheque(c,status){setCheque(c,status);toast(status==="bounced"?t("tBounced"):t("tCleared"),status==="bounced"?"bad":"ok");}
function openOverride(c){
  const opt=(st)=>el("button",{class:"btn "+(st===c.st?"primary":"ghost"),onclick:()=>{setCheque(c,st,true);closeModal();toast(t("overrode")+" "+t(st));},text:t(st)});
  openModal(el("div",{},[
    el("div",{class:"mh"},[el("h3",{text:t("overrideT")}),el("button",{class:"x",text:"✕",onclick:closeModal})]),
    el("div",{class:"mb"},[
      el("div",{style:"font-weight:700;font-size:14px",text:"#"+c.no+" · "+banks[c.bank][lang]}),
      el("div",{style:"color:var(--muted);font-size:12.5px;margin:3px 0 13px",text:dn(c.dealer)+" · "+fmt(c.amt)}),
      el("div",{style:"background:var(--warn-bg);border:1px solid #f3e3bf;color:var(--warn);border-radius:11px;padding:11px 13px;font-size:12.5px;margin-bottom:14px",text:t("overrideNote")}),
      el("div",{class:"mactions"},[opt("pending"),opt("cleared"),opt("bounced")])
    ])
  ]));
}
function toggleHold(d){d.creditOverride=!d.creditOverride;render();refreshAfter();toast(d.creditOverride?t("holdOverridden"):t("holdRestored"));}
function field(label,input){return el("div",{class:"fld"},[el("label",{text:label}),input]);}
function openAddCheque(){
  const selDealer=el("select",{},dealers.map(d=>el("option",{value:String(d.id),text:d[lang]})));
  const selBank=el("select",{},Object.keys(banks).map(k=>el("option",{value:k,text:banks[k][lang]})));
  const inNo=el("input",{type:"text",placeholder:"778451"});
  const inAmt=el("input",{type:"number",step:"0.001",placeholder:"2500.000"});
  const inDue=el("input",{type:"date",value:"2026-07-15"});
  const photo=el("button",{class:"photo",onclick:()=>{
    inNo.value="9"+Math.floor(10000+Math.random()*89999);
    inAmt.value=(Math.floor(15+Math.random()*46)*100).toFixed(3);
    inDue.value="2026-0"+(7+Math.floor(Math.random()*2))+"-"+String(5+Math.floor(Math.random()*20)).padStart(2,"0");
    selDealer.selectedIndex=Math.floor(Math.random()*dealers.length);
    selBank.selectedIndex=Math.floor(Math.random()*Object.keys(banks).length);
  }},[icon("camera"),el("span",{text:t("snap")})]);
  const submit=el("button",{class:"btn primary",text:t("add"),onclick:()=>{
    if(!inAmt.value||!inDue.value)return;
    cheques.push({dealer:Number(selDealer.value),no:inNo.value||("9"+Math.floor(10000+Math.random()*89999)),bank:selBank.value,amt:parseFloat(inAmt.value),due:inDue.value,st:"pending"});
    closeModal();render();toast(t("tAdded"),"ok");
  }});
  openModal(el("div",{},[
    el("div",{class:"mh"},[el("h3",{text:t("addCheque")}),el("button",{class:"x",text:"✕",onclick:closeModal})]),
    el("div",{class:"mb"},[photo,field(t("fDealer"),selDealer),field(t("fBank"),selBank),field(t("fNo"),inNo),field(t("fAmount"),inAmt),field(t("fDue"),inDue),
      el("div",{class:"mactions"},[el("button",{class:"btn ghost",text:t("cancel"),onclick:closeModal}),submit])])
  ]));
}
function openReminder(c){
  const d=dl(c.dealer);
  const msg=t("remMsg").replace("{dealer}",d[lang]).replace("{no}",c.no).replace("{bank}",banks[c.bank][lang]).replace("{amt}",fmt(c.amt)).replace("{date}",fmtDate(c.due));
  openModal(el("div",{},[
    el("div",{class:"mh"},[el("h3",{text:t("remTitle")}),el("button",{class:"x",text:"✕",onclick:closeModal})]),
    el("div",{class:"mb"},[
      el("div",{class:"wa"},[
        el("div",{class:"wabar"},[icon("wa"),el("span",{text:d[lang]})]),
        el("div",{class:"wabubble"},[document.createTextNode(msg),el("div",{class:"watime",text:"09:24"})])
      ]),
      el("div",{class:"mactions",style:"margin-top:15px"},[el("button",{class:"btn ghost",text:t("cancel"),onclick:closeModal}),el("button",{class:"btn primary",text:t("remSend"),onclick:()=>{closeModal();toast(t("tSent"),"ok");}})])
    ])
  ]));
}
render();
</script>
</body>
